host: localhost:3000
info:
  contact:
    name: 上海电力大学
    url: https://www.shiep.edu.cn
  description: 酒店预订管理系统 API — 支持用户注册、酒店搜索、客房预订、订单管理、评价与数据统计
  license:
    name: MIT
  title: Hotel Booking API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 验证用户名密码并返回 JWT 访问令牌
      parameters:
      - description: 登录凭据
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.tokenResponse'
              type: object
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response'
      summary: 用户登录
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 将 access token 和 refresh token 加入黑名单，使其立即失效
      parameters:
      - description: access token 与 refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "401":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/model.Response'
      summary: 登出
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 用刷新令牌换取新的访问令牌和刷新令牌
      parameters:
      - description: 刷新令牌
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.tokenResponse'
              type: object
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "401":
          description: 刷新令牌无效或已过期
          schema:
            $ref: '#/definitions/model.Response'
      summary: 刷新令牌
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建新账户并返回 JWT 访问令牌
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/handler.tokenResponse'
              type: object
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "409":
          description: 用户名已存在
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/model.Response'
      summary: 用户注册
      tags:
      - auth
  /hotels:
    get:
      description: 分页查询酒店列表，支持按区域、星级、关键词筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 区域 ID
        in: query
        name: regionID
        type: integer
      - description: 星级
        in: query
        name: starLevel
        type: integer
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/backend_model_schema.Hotel'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询酒店列表
      tags:
      - hotels
    post:
      consumes:
      - application/json
      description: 创建新酒店记录
      parameters:
      - description: 酒店信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_model_schema.Hotel'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_model_schema.Hotel'
              type: object
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 创建酒店
      tags:
      - hotels
  /hotels/{id}:
    delete:
      description: 根据 UUID 软删除酒店
      parameters:
      - description: 酒店 ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 删除酒店
      tags:
      - hotels
    get:
      description: 根据 UUID 查询单个酒店信息
      parameters:
      - description: 酒店 ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_model_schema.Hotel'
              type: object
        "400":
          description: 无效的酒店 ID
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: 酒店不存在
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      summary: 查询酒店详情
      tags:
      - hotels
    put:
      consumes:
      - application/json
      description: 根据 UUID 更新酒店信息
      parameters:
      - description: 酒店 ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 更新的酒店信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_model_schema.Hotel'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_model_schema.Hotel'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 更新酒店信息
      tags:
      - hotels
  /hotels/{id}/images:
    delete:
      description: 根据酒店 ID 和图片 URL 删除酒店图片（同时删除 COS 对象和数据库记录）。
      parameters:
      - description: 酒店 ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 图片 URL
        in: query
        name: imageUrl
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 删除酒店图片
      tags:
      - hotels
    post:
      consumes:
      - multipart/form-data
      description: 上传图片到腾讯云 COS 并关联到指定酒店。
      parameters:
      - description: 酒店 ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 图片文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  properties:
                    key:
                      type: string
                    url:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 上传酒店图片
      tags:
      - hotels
  /orders:
    get:
      description: 分页查询全部订单列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/backend_model_schema.Order'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.Response'
      security:
      - BearerAuth: []
      summary: 查询全部订单
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: 创建新订单（含入住人信息），返回 201 Created
      parameters:
      - description: 订单信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/backend_model_schema.Order'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/backend_model_schema.Order'
              type: object
        "400":
          description: 请求参数无效
          schema:
            $ref: '#/definitions/model.Response'
        "500":
